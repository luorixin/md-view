name: Create Release Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build release metadata
        id: release
        run: |
          COMMIT_STAMP=$(git show -s --date=format:'%Y%m%d-%H%M' --format=%cd HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_VERSION="v${COMMIT_STAMP}-${SHORT_SHA}"
          RELEASE_BRANCH="release/${RELEASE_VERSION}"
          echo "branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release branch with version commit
        id: branch
        run: |
          RELEASE_BRANCH="${{ steps.release.outputs.branch }}"
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          SOURCE_SHA=$(git rev-parse HEAD)
          CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Branch already exists: $RELEASE_BRANCH"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git switch -c "$RELEASE_BRANCH"
            mkdir -p .release
            printf '{\n  "version": "%s",\n  "branch": "%s",\n  "sourceSha": "%s",\n  "createdAt": "%s"\n}\n' \
              "$RELEASE_VERSION" \
              "$RELEASE_BRANCH" \
              "$SOURCE_SHA" \
              "$CREATED_AT" \
              > .release/release.json
            git add .release/release.json
            git commit -m "chore(release): prepare ${RELEASE_VERSION}"
            git push origin HEAD:refs/heads/"$RELEASE_BRANCH"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or confirm release PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const branch = "${{ steps.release.outputs.branch }}";
            const version = "${{ steps.release.outputs.version }}";
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: "main",
              state: "open",
            });

            if (existing.data.length > 0) {
              core.summary
                .addRaw(`Release PR already exists for ${branch}: #${existing.data[0].number}`)
                .write();
              return;
            }

            const template = fs.readFileSync(
              ".github/PULL_REQUEST_TEMPLATE/release.md",
              "utf8",
            );

            const body = [
              "## Release Metadata",
              "",
              `- Version: \`${version}\``,
              `- Branch: \`${branch}\``,
              `- Source commit: \`${context.sha}\``,
              "",
              template,
            ].join("\n");

            const response = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: "main",
              title: `Release ${version}`,
              body,
              draft: true,
            });

            core.summary
              .addRaw(`Created draft PR #${response.data.number} for ${branch}`)
              .write();

      - name: Publish summary
        run: |
          echo "Created or confirmed release branch: \`${{ steps.release.outputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Release version: \`${{ steps.release.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
