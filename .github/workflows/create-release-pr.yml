name: Create Release PR

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch diff against main
        id: diff
        run: |
          git fetch origin main
          AHEAD_COUNT=$(git rev-list --count origin/main..HEAD)
          echo "ahead_count=${AHEAD_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create draft PR if needed
        if: steps.diff.outputs.ahead_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PR_TOKEN || github.token }}
          script: |
            const fs = require("node:fs");
            const branch = context.ref.replace("refs/heads/", "");
            const versionFilePath = ".release/release.json";
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: "main",
              state: "open",
            });

            if (existing.data.length > 0) {
              core.summary.addRaw(`PR already exists for ${branch}`).write();
              return;
            }

            const template = fs.readFileSync(
              ".github/PULL_REQUEST_TEMPLATE/release.md",
              "utf8",
            );

            let releaseVersion = branch.replace(/^release\//, "");
            if (fs.existsSync(versionFilePath)) {
              const releaseInfo = JSON.parse(fs.readFileSync(versionFilePath, "utf8"));
              if (releaseInfo.version) {
                releaseVersion = releaseInfo.version;
              }
            }

            const body = [
              "## Release Metadata",
              "",
              `- Version: \`${releaseVersion}\``,
              `- Branch: \`${branch}\``,
              `- Source commit: \`${context.sha}\``,
              "",
              template,
            ].join("\n");

            let response;
            try {
              response = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: branch,
                base: "main",
                title: `Release ${releaseVersion}`,
                body,
                draft: true,
              });
            } catch (error) {
              if (
                error &&
                typeof error === "object" &&
                "status" in error &&
                error.status === 403
              ) {
                core.setFailed(
                  "Release pull request creation was blocked. " +
                    "Enable 'Allow GitHub Actions to create and approve pull requests' " +
                    "or add a RELEASE_PR_TOKEN secret with pull request write permission.",
                );
                return;
              }

              throw error;
            }

            core.summary
              .addRaw(`Created draft PR #${response.data.number} for ${branch}`)
              .write();

      - name: Skip empty release branch PR
        if: steps.diff.outputs.ahead_count == '0'
        run: |
          echo "Release branch matches main; skipping draft PR creation." >> "$GITHUB_STEP_SUMMARY"
